<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI 音乐</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    min-height: 100vh;
    padding-bottom: 120px;
  }
  header {
    background: #1a1a1a;
    padding: 16px 20px;
    border-bottom: 1px solid #2a2a2a;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  h1 { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 12px; }
  .search-row { display: flex; gap: 8px; }
  input[type=text] {
    flex: 1;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 10px;
    color: #fff;
    font-size: 16px;
    padding: 10px 14px;
    outline: none;
    -webkit-appearance: none;
  }
  input[type=text]:focus { border-color: #5a5aff; }
  button#search-btn {
    background: #5a5aff;
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 18px;
    cursor: pointer;
    white-space: nowrap;
  }
  button#search-btn:disabled { background: #333; color: #666; }
  .status { padding: 12px 20px; font-size: 13px; color: #888; min-height: 36px; }
  .track-list { padding: 0 12px; }
  .track-item {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .track-item:active { background: #222; }
  .track-item.active { border-color: #5a5aff; background: #1c1c30; }
  .play-icon {
    width: 36px; height: 36px;
    background: #2a2a2a;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
  }
  .track-item.active .play-icon { background: #5a5aff; }
  .track-info { flex: 1; min-width: 0; }
  .track-title {
    font-size: 15px; font-weight: 500; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .track-sub {
    font-size: 12px; color: #888; margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .track-ranks {
    font-size: 11px; color: #666; margin-top: 2px;
  }
  .rank-badge {
    display: inline-block;
    background: #2a2a2a;
    padding: 2px 6px;
    border-radius: 4px;
    margin-right: 6px;
  }
  .rank-badge.changed { background: #3a3a00; color: #ffcc00; }
  .track-duration { font-size: 12px; color: #666; flex-shrink: 0; }
  .menu-btn {
    width: 32px; height: 32px;
    background: #2a2a2a;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 16px;
    color: #888;
    cursor: pointer;
    margin-left: 8px;
  }
  .menu-btn:hover { background: #3a3a3a; color: #fff; }
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal.show { display: flex; }
  .modal-content {
    background: #1a1a1a;
    border-radius: 12px;
    max-width: 600px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .modal-title { font-size: 18px; font-weight: 600; }
  .close-btn {
    background: none;
    border: none;
    color: #888;
    font-size: 24px;
    cursor: pointer;
    padding: 0;
    width: 32px;
    height: 32px;
  }
  .close-btn:hover { color: #fff; }
  .info-row { margin-bottom: 12px; }
  .info-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .info-value { font-size: 14px; color: #e0e0e0; white-space: pre-wrap; word-break: break-word; }
  .player-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
    padding: 10px 16px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
  }
  audio { width: 100%; min-height: 44px; }
  .empty { text-align: center; color: #555; padding: 40px 20px; font-size: 15px; }
</style>
</head>
<body>
<header>
  <h1>🎵 AI 音乐</h1>
  <div class="search-row">
    <input type="text" id="query" placeholder="描述想听的音乐，如：安静的钢琴曲" />
    <button id="search-btn" onclick="doSearch()">搜索</button>
  </div>
</header>

<div class="status" id="status"></div>
<div class="track-list" id="track-list">
  <div class="empty">输入描述，搜索你想听的音乐</div>
</div>

<div class="player-bar">
  <audio id="player" controls preload="none"></audio>
</div>

<div class="modal" id="info-modal" onclick="if(event.target===this) closeModal()">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">曲目信息</div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const player = document.getElementById('player');
let currentId = null;

document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

player.addEventListener('ended', () => {
  const items = [...document.querySelectorAll('.track-item')];
  const cur = document.getElementById('track-' + currentId);
  const idx = items.indexOf(cur);
  if (idx >= 0 && idx < items.length - 1) {
    const nextId = items[idx + 1].id.replace('track-', '');
    playTrack(Number(nextId));
  }
});

async function doSearch() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;

  const btn = document.getElementById('search-btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = 'AI 理解中...';
  currentId = null;
  document.getElementById('track-list').innerHTML = '';

  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query, n_results: 20})
    });
    if (!res.ok) {
      let msg = '搜索失败';
      try { const err = await res.json(); msg = err.detail || msg; } catch {}
      throw new Error(msg);
    }
    const data = await res.json();
    const st = data.search_text;
    status.textContent = `AI 理解：${st.length > 60 ? st.slice(0, 60) + '…' : st}`;
    renderTracks(data.tracks);
  } catch (e) {
    status.textContent = '错误：' + e.message;
  } finally {
    btn.disabled = false;
  }
}

function formatDuration(sec) {
  if (!sec) return '';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function renderTracks(tracks) {
  const list = document.getElementById('track-list');
  if (!tracks.length) {
    list.innerHTML = '<div class="empty">没有找到匹配的音乐</div>';
    return;
  }
  list.innerHTML = tracks.map((t, i) => {
    const rankInfo = t.vector_rank ?
      `<div class="track-ranks">
        <span class="rank-badge">Rerank: #${t.rerank_rank}</span>
        <span class="rank-badge${t.vector_rank !== t.rerank_rank ? ' changed' : ''}">向量: #${t.vector_rank}</span>
      </div>` : '';
    return `
    <div class="track-item" id="track-${t.id}">
      <div class="play-icon" onclick="playTrack(${t.id})">${i + 1}</div>
      <div class="track-info" onclick="playTrack(${t.id})">
        <div class="track-title">${esc(t.title)}</div>
        <div class="track-sub">${esc(t.artist)}${t.album ? ' · ' + esc(t.album) : ''}</div>
        ${rankInfo}
      </div>
      <div class="track-duration" onclick="playTrack(${t.id})">${formatDuration(t.duration_sec)}</div>
      <div class="menu-btn" onclick="event.stopPropagation(); showInfo(${t.id})">⋯</div>
    </div>
  `;
  }).join('');
}

function playTrack(id) {
  if (currentId) {
    const prev = document.getElementById('track-' + currentId);
    if (prev) {
      prev.classList.remove('active');
      const idx = [...document.querySelectorAll('.track-item')].indexOf(prev);
      prev.querySelector('.play-icon').textContent = idx + 1;
    }
  }
  currentId = id;
  const item = document.getElementById('track-' + id);
  if (item) { item.classList.add('active'); item.querySelector('.play-icon').textContent = '▶'; }
  player.src = '/audio/' + id;
  player.play().catch(() => {
    document.getElementById('status').textContent = '播放失败，请点击播放器手动播放';
  });
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function showInfo(id) {
  const modal = document.getElementById('info-modal');
  const body = document.getElementById('modal-body');
  body.innerHTML = '<div style="text-align:center;color:#888;">加载中...</div>';
  modal.classList.add('show');

  try {
    const res = await fetch(`/api/track/${id}`);
    if (!res.ok) throw new Error('获取失败');
    const track = await res.json();

    body.innerHTML = `
      <div class="info-row">
        <div class="info-label">标题</div>
        <div class="info-value">${esc(track.title || '未知')}</div>
      </div>
      <div class="info-row">
        <div class="info-label">艺术家</div>
        <div class="info-value">${esc(track.artist || '未知')}</div>
      </div>
      <div class="info-row">
        <div class="info-label">专辑</div>
        <div class="info-value">${esc(track.album || '未知')}</div>
      </div>
      <div class="info-row">
        <div class="info-label">文件路径</div>
        <div class="info-value">${esc(track.path)}</div>
      </div>
      <div class="info-row">
        <div class="info-label">AI 描述</div>
        <div class="info-value">${esc(track.embedding_text || '暂无')}</div>
      </div>
    `;
  } catch (e) {
    body.innerHTML = `<div style="color:#f88;">错误：${esc(e.message)}</div>`;
  }
}

function closeModal() {
  document.getElementById('info-modal').classList.remove('show');
}
</script>
</body>
</html>
